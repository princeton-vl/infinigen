name: Integration Render

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - develop_materials
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to tag outputs and comment on"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RENDER_ARCHIVE_ROOT: /home/renderbot/integration_test_archive/renders/integration
  VIEWER_BASE_URL: https://pvlbox.princeton.edu

jobs:
  render:
    if: github.event.pull_request.draft == false
    runs-on: [self-hosted, renderbot]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up SSH for procfunc
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROCFUNC_DEPLOY_KEY }}

      - name: Update submodules
        run: |
          git submodule update --init --recursive

      - name: Install infinigen & dependencies
        run: |
          uv venv
          uv pip install -e ".[dev,vis]"

      - name: Run integration renders
        id: render
        continue-on-error: true
        env:
          GPU_MEM_USED_MAX_MB: 10000
          GIT_BRANCH_OVERRIDE: ${{ github.head_ref || github.ref_name }}
          MATERIAL_LIMIT: -1
          OBJECT_LIMIT: -1
          SCENE_LIMIT: -1
        run: |
          set -e
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          fi
          RUN_LABEL="nopr"
          if [ -n "$PR_NUMBER" ]; then
            RUN_LABEL="pr${PR_NUMBER}"
          fi
          TS="$(date -u +'%Y-%m-%dT%H-%M-%SZ')"
          SHA="${GITHUB_SHA:0:7}"
          OUTPUT_DIR="$RUNNER_TEMP/integration-renders-$RUN_LABEL-$TS-$SHA"
          mkdir -p "$OUTPUT_DIR"
          echo "OUTPUT_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          echo "TS=$TS" >> "$GITHUB_ENV"
          echo "SHA=$SHA" >> "$GITHUB_ENV"
          uv run python scripts/integration_v2/launch_andromeda.py \
            --output_path "$OUTPUT_DIR" \
            --jobs-per-gpu 4 \
            --gpus available

      - name: Archive renders to permanent storage
        if: always()
        run: |
          set -e

          # These vars come from the render step via $GITHUB_ENV. If that step
          # crashed before exporting them (or didn't run at all), they'll be
          # empty here — and `rsync -a "$OUTPUT_DIR"/ "$TARGET_DIR"/` with an
          # empty OUTPUT_DIR expands to `rsync -a / ...`, which copies the
          # entire root filesystem until the disk fills. Fail loudly instead.
          echo "OUTPUT_DIR=$OUTPUT_DIR"
          echo "TS=$TS"
          echo "SHA=$SHA"
          if [ -z "$OUTPUT_DIR" ] || [ -z "$TS" ] || [ -z "$SHA" ]; then
            echo "ERROR: render step did not export OUTPUT_DIR/TS/SHA — nothing to archive."
            exit 1
          fi

          TARGET_DIR="$RENDER_ARCHIVE_ROOT/${TS}_${SHA}"
          REL_PATH="${TS}_${SHA}"
          mkdir -p "$TARGET_DIR"
          rsync -a "$OUTPUT_DIR"/ "$TARGET_DIR"/
          if [ "${{ github.ref_name }}" = "develop_materials" ]; then
            ln -sfn "$TARGET_DIR" "$RENDER_ARCHIVE_ROOT/develop_latest"
          fi
          echo "TARGET_DIR=$TARGET_DIR" >> "$GITHUB_ENV"
          echo "REL_PATH=$REL_PATH" >> "$GITHUB_ENV"

      - name: Print viewer link
        if: always()
        run: |
          echo "Integration renders are ready:"
          echo "${VIEWER_BASE_URL}/?v=${REL_PATH}"
          echo "${VIEWER_BASE_URL}/?v=develop_latest&v=${REL_PATH}"
          echo "Path: ${TARGET_DIR}"

      - name: Comment PR with viewer link
        if: ${{ always() && (github.event.pull_request.number || inputs.pr_number) }}
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request?.number || core.getInput('pr_number');
            const targetDir = process.env.TARGET_DIR;
            const viewerBase = process.env.VIEWER_BASE_URL;
            const relPath = process.env.REL_PATH;
            const link = `${viewerBase}/?v=${relPath}`;
            const compare = `${viewerBase}/?v=develop_latest&v=${relPath}`;
            const body = [
              "Integration renders are ready:",
              link,
              "",
              "Compare vs develop_latest:",
              compare,
              "",
              `Path: ${targetDir}`
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body
            });

      - name: Fail job if any render failed
        if: always()
        run: |
          if [ "${{ steps.render.outcome }}" = "failure" ]; then
            echo "One or more renders failed — marking job red."
            exit 1
          fi
